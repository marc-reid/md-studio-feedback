name: Report a bug
description: Tell us about something that did not work as expected.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve MD Studio.

        This report will be public. Do not include confidential documents, personal information, passwords, tokens, or other sensitive material. If content is needed to reproduce the problem, use the smallest possible redacted example.

  - type: dropdown
    id: area
    attributes:
      label: Where did the problem happen?
      options:
        - Pasting rich text or HTML
        - Importing an HTML snippet or file
        - Editing Markdown
        - Previewing the result
        - Copying, downloading, or printing
        - Saving locally or changing options
        - Somewhere else
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Tell us exactly what you did, in order.
      placeholder: |
        1. Open MD Studio
        2. Paste...
        3. Click...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What happened instead?
    validations:
      required: true

  - type: textarea
    id: sample
    attributes:
      label: Small redacted example
      description: Optional. Include only the minimum non-sensitive HTML or Markdown needed to demonstrate the problem.
      render: text

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Microsoft Edge
        - Safari
        - Firefox
        - Another browser
    validations:
      required: true

  - type: input
    id: browser-version
    attributes:
      label: Browser version
      placeholder: For example, Chrome 138

  - type: input
    id: operating-system
    attributes:
      label: Operating system
      placeholder: For example, macOS 15 or Windows 11
    validations:
      required: true

  - type: input
    id: page-url
    attributes:
      label: Page address
      description: Copy the address from the browser if it is different from https://mdstudio.dev.
      placeholder: https://mdstudio.dev

  - type: textarea
    id: additional-context
    attributes:
      label: Anything else?
      description: Screenshots are welcome if they do not reveal private information.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched the existing issues for this problem.
          required: true
        - label: I removed confidential and personal information from this report.
          required: true
